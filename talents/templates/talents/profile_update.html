{% extends 'talents/base.html' %}
{% load static %}

{% block content %}

<style>
    /* --- THEME ENGINE --- */
    
    /* 1. LIGHT MODE (Default) */
    :root {
        --bg-body: #f1f5f9;
        --card-bg: #ffffff;
        --card-border: #cbd5e1;
        --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        
        --text-main: #0f172a;
        --text-muted: #64748b;
        --accent: #4f46e5;
        
        --input-bg: #f8fafc; 
        --input-border: 1px solid #94a3b8;
    }

    /* 2. DIM MODE (Dark Blue / Slate - Distinct from Black) */
    [data-theme="dim"] {
        --bg-body: #0f172a;       /* Deep Slate Blue */
        --card-bg: #1e293b;       /* Lighter Slate Blue */
        --card-border: #334155;   /* Blue-Grey Border */
        --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        
        --text-main: #f8fafc;     /* Off-White */
        --text-muted: #94a3b8;    /* Blue-Grey Text */
        --accent: #818cf8;
        
        --input-bg: #0f172a;      /* Dark Input */
        --input-border: 1px solid #334155;
    }

    /* 3. LIGHTS OUT (Pure Black - OLED Friendly) */
    [data-theme="lights-out"] {
        --bg-body: #000000;       /* Pure Black */
        --card-bg: #111111;       /* Very Dark Grey */
        --card-border: #333333;   /* Grey Border */
        --card-shadow: none;
        
        --text-main: #ffffff;     /* Pure White */
        --text-muted: #a3a3a3;    /* Silver Text */
        --accent: #a78bfa;
        
        --input-bg: #000000;      /* Black Input */
        --input-border: 1px solid #333333;
    }

    /* --- COMPONENTS --- */
    body { background-color: var(--bg-body); transition: background-color 0.3s ease; }

    .settings-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 30px;
        box-shadow: var(--card-shadow);
        color: var(--text-main);
        transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    /* INPUTS */
    .form-control-glass {
        background: var(--input-bg);
        border: var(--input-border);
        color: var(--text-main);
        border-radius: 8px;
        padding: 12px 16px;
        width: 100%; outline: none; transition: 0.2s;
        font-weight: 500;
    }
    .form-control-glass:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }

    .form-label-glass {
        font-size: 0.75rem; font-weight: 800; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;
    }

    /* --- GHOST AVATAR --- */
    .avatar-wrapper {
        position: relative; width: 140px; height: 140px; margin: 0 auto 20px;
    }
    
    .avatar-circle {
        width: 100%; height: 100%; border-radius: 50%;
        overflow: hidden; 
        border: 4px solid var(--card-bg);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        position: relative;
        background: var(--input-bg);
    }

    .ghost-placeholder {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
        background: var(--card-border); /* Adapts to theme color */
        color: var(--text-main);
        font-size: 5rem;
    }

    .real-avatar {
        width: 100%; height: 100%; object-fit: cover;
    }

    .upload-btn-float {
        position: absolute; bottom: 5px; right: 5px;
        width: 40px; height: 40px; border-radius: 50%;
        background: var(--accent); color: white;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; border: 3px solid var(--card-bg);
        transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .upload-btn-float:hover { transform: scale(1.1); }

    .btn-save {
        background: var(--accent); color: white;
        padding: 12px 40px; border-radius: 50px; border: none; font-weight: 700;
        box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        transition: 0.2s;
    }
    .btn-save:hover { transform: translateY(-2px); opacity: 0.9; color: white; }

</style>

<div class="container py-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1" style="color: var(--text-main)">Edit Profile</h2>
            <p style="color: var(--text-muted)">Update your public details.</p>
        </div>
        <div class="d-flex gap-3">
            <a href="{% url 'dashboard' %}" class="btn btn-link text-decoration-none" style="color: var(--text-muted)">Cancel</a>
            <button type="submit" form="profileForm" class="btn-save d-md-none">Save</button>
        </div>
    </div>

    <form method="post" enctype="multipart/form-data" id="profileForm">
        {% csrf_token %}
        
        <div class="row g-4">
            
            <div class="col-lg-4">
                <div class="settings-card text-center">
                    
                    <div class="avatar-wrapper">
                        <div class="avatar-circle">
                            <img src="{% if user.profile.profile_pic %}{{ user.profile.profile_pic.url }}{% endif %}" 
                                 class="real-avatar" 
                                 id="avatarPreview"
                                 style="{% if not user.profile.profile_pic %}display: none;{% endif %}">
                            
                            <div class="ghost-placeholder" id="ghostAvatar" 
                                 style="{% if user.profile.profile_pic %}display: none;{% endif %}">
                                <i class="fas fa-user"></i>
                            </div>
                        </div>

                        <label for="id_profile_pic" class="upload-btn-float">
                            <i class="fas fa-camera"></i>
                            <input type="file" name="profile_pic" id="id_profile_pic" hidden onchange="previewAvatar(this)">
                        </label>
                    </div>

                    <h5 class="fw-bold mb-1">{{ user.first_name }} {{ user.last_name }}</h5>
                    <p class="small text-muted mb-3">@{{ user.username }}</p>

                    <hr style="border-color: var(--card-border); opacity: 0.5;">

                    <div class="text-start">
                        <label class="form-label-glass">Cover Photo</label>
                        <label class="d-flex align-items-center justify-content-center w-100 p-4 rounded-3" 
                               style="background: var(--input-bg); border: 2px dashed var(--card-border); cursor: pointer;">
                            <div class="text-center">
                                <i class="fas fa-cloud-upload-alt fs-4 mb-2" style="color: var(--text-muted)"></i>
                                <div class="small fw-bold" style="color: var(--text-muted)">Upload Cover</div>
                            </div>
                            <input type="file" hidden>
                        </label>
                    </div>

                </div>
            </div>

            <div class="col-lg-8">
                <div class="settings-card">
                    <h5 class="fw-bold mb-4">Basic Information</h5>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label-glass">First Name</label>
                            <input type="text" name="first_name" class="form-control-glass" value="{{ user.first_name }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-glass">Last Name</label>
                            <input type="text" name="last_name" class="form-control-glass" value="{{ user.last_name }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-glass">Professional Headline</label>
                        <input type="text" name="title" class="form-control-glass" value="{{ user.profile.title }}" placeholder="e.g. Senior Python Developer">
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label-glass">Location</label>
                            <input type="text" name="location" class="form-control-glass" value="{{ user.profile.location }}" placeholder="City, Country">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label-glass">Hourly Rate ($)</label>
                            <input type="number" name="hourly_rate" class="form-control-glass" value="{{ user.profile.hourly_rate }}" placeholder="0.00">
                        </div>
                    </div>

                    <h5 class="fw-bold mb-4 mt-5">About & Skills</h5>
                    
                    <div class="mb-4">
                        <label class="form-label-glass">Bio / Overview</label>
                        <textarea name="bio" class="form-control-glass" rows="5" placeholder="Tell clients about your experience...">{{ user.profile.bio }}</textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-glass">Skills (Comma Separated)</label>
                        <input type="text" name="skills_input" class="form-control-glass" value="{% for skill in user.profile.skills.all %}{{ skill.name }}{% if not forloop.last %}, {% endif %}{% endfor %}" placeholder="Python, Django, React...">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label-glass">Portfolio Link</label>
                        <input type="url" name="website" class="form-control-glass" value="{{ user.profile.website }}" placeholder="https://github.com/username">
                    </div>

                    <div class="text-end">
                        <button type="submit" class="btn-save d-none d-md-inline-block">Save Changes</button>
                    </div>
                </div>
            </div>

        </div>
    </form>
</div>

<script>
    function previewAvatar(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('ghostAvatar').style.display = 'none';
                var preview = document.getElementById('avatarPreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

{% endblock %}
