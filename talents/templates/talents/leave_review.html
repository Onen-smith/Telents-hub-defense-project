{% extends 'talents/base.html' %}
{% load static %}

{% block content %}

<style>
    /* --- REVIEW CONTAINER --- */
    .review-section {
        max-width: 700px;
        margin: 60px auto;
        padding: 0 20px;
    }

    .glass-panel {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        text-align: center;
    }

    /* --- JOB SUMMARY --- */
    .job-badge {
        background: rgba(139, 92, 246, 0.1);
        color: var(--primary);
        padding: 8px 20px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.85rem;
        display: inline-block;
        margin-bottom: 20px;
    }

    /* --- INTERACTIVE STARS --- */
    .star-rating {
        display: flex;
        flex-direction: row-reverse; /* Magic trick for CSS hover logic */
        justify-content: center;
        gap: 10px;
        margin: 30px 0;
    }

    .star-rating input { display: none; }

    .star-rating label {
        font-size: 3rem;
        color: var(--border); /* Grey by default */
        cursor: pointer;
        transition: color 0.2s, transform 0.2s;
    }

    /* Hover & Checked States */
    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label {
        color: #fbbf24; /* Gold */
        transform: scale(1.1);
    }

    /* --- TEXT AREA --- */
    .review-input {
        background: var(--bg-body);
        border: 1px solid var(--border);
        color: var(--text-main);
        border-radius: 16px;
        padding: 20px;
        width: 100%;
        resize: none;
        outline: none;
        transition: 0.3s;
        min-height: 150px;
    }
    .review-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

</style>

<div class="review-section">
    <div class="glass-panel">
        
        <div class="job-badge"><i class="fas fa-briefcase me-2"></i> Contract Completed</div>
        
        <h2 class="fw-bold mb-2" style="color: var(--text-main)">Rate your experience</h2>
        <p class="text-muted">How was working with <strong style="color: var(--text-main)">{{ freelancer_name|default:"the freelancer" }}</strong> on <em style="color: var(--text-main)">"{{ job_title|default:"Python Development" }}"</em>?</p>

        <form method="post">
            {% csrf_token %}
            
            <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5" required/><label for="star5" title="Excellent"><i class="fas fa-star"></i></label>
                <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="Good"><i class="fas fa-star"></i></label>
                <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="Average"><i class="fas fa-star"></i></label>
                <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="Poor"><i class="fas fa-star"></i></label>
                <input type="radio" id="star1" name="rating" value="1" /><label for="star1" title="Terrible"><i class="fas fa-star"></i></label>
            </div>

            <div class="mb-4 text-start">
                <label class="fw-bold small text-uppercase text-muted mb-2">Public Review</label>
                <textarea name="comment" class="review-input" placeholder="Share details about your experience. Was the work on time? Was the communication clear?"></textarea>
            </div>

            <div class="d-grid gap-3">
                <button type="submit" class="btn btn-primary-glow py-3 rounded-pill fw-bold fs-5 shadow-lg">
                    Submit Review
                </button>
                <a href="{% url 'dashboard' %}" class="btn btn-link text-muted text-decoration-none">Skip for now</a>
            </div>

        </form>
    </div>
</div>

{% endblock %}
